kind = "web"
previewPath = "/"
title = "Discord Automation Studio"
version = "1.0.0"
id = "artifacts/discord-automation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24789

[services.development]
run = "pnpm --filter @workspace/discord-automation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discord-automation", "run", "build" ]
publicDir = "artifacts/discord-automation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24789"
BASE_PATH = "/"
